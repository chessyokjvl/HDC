<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard | สถิติผู้ป่วยจิตเวช</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-dark: #0f2027;
            --primary-blue: #203a43;
            --primary-light: #2c5364;
            --gold-accent: #d4af37;
            --gold-hover: #f1c40f;
            --light-bg: #f8f9fa;
            --text-dark: #333333;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--light-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            background: var(--primary-dark);
            color: var(--gold-accent);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 4px solid var(--gold-accent);
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }
        
        .header p { margin: 5px 0 0; color: #ccc; font-weight: 300; }

        /* Main Navigation */
        .main-nav {
            display: flex;
            background: var(--primary-light);
            padding: 10px;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-light);
            padding: 10px 25px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--gold-accent);
            color: var(--primary-dark);
            border-color: var(--gold-accent);
            font-weight: 600;
        }

        /* View Sections */
        .view-section { display: none; padding: 20px; }
        .view-section.active { display: block; animation: fadeIn 0.5s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* View 1: Grid Styles */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .chart-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-top: 3px solid var(--primary-blue);
        }
        .chart-card h3 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: var(--primary-dark);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .grid-chart-container { position: relative; height: 260px; width: 100%; }

        /* View 2: District Styles */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; }
        .tab-btn {
            background: #fff;
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 8px 18px;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--primary-blue);
            color: var(--gold-accent);
        }
        .toggle-group {
            display: flex;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
        }
        .toggle-btn {
            border: none;
            padding: 8px 25px;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #666;
        }
        .toggle-btn.active {
            background: var(--gold-accent);
            color: var(--primary-dark);
        }
        .main-chart-container {
            position: relative;
            height: 350px;
            width: 100%;
            margin-bottom: 30px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .table-responsive {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            white-space: nowrap;
        }
        th {
            background: var(--primary-blue);
            color: var(--gold-accent);
            padding: 12px 15px;
            text-align: right;
            font-weight: 500;
            position: sticky;
            top: 0;
        }
        th:first-child { text-align: left; }
        td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
            color: #444;
        }
        td:first-child { text-align: left; font-weight: 600; color: var(--primary-blue); }
        tbody tr:hover { background-color: #fcf8e3; }
        .total-col { font-weight: bold; color: #b21f1f; }
        .avg-col { font-weight: bold; color: #2ecc71; }

        @media (max-width: 768px) {
            .controls { flex-direction: column; align-items: flex-start; }
            .toggle-group { width: 100%; }
            .toggle-btn { flex: 1; }
            .header h1 { font-size: 1.4rem; }
            .main-chart-container { height: 250px; }
            body { padding: 10px; }
            .nav-btn { width: 100%; }
        }
    </style>
</head>

</div>

    let mainChartInstance = null;
    const chartColors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#e67e22', '#1abc9c', '#34495e', '#d35400', '#c0392b', '#7f8c8d', '#8e44ad', '#27ae60'];

    const tabContainer = document.getElementById('provinceTabs');
    provinces.forEach(prov => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${prov === currentProvince ? 'active' : ''}`;
        btn.innerText = prov;
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentProvince = prov;
            updateDistrictView();
        };
        tabContainer.appendChild(btn); // Fix bug จากรอบที่แล้ว
    });

    function setType(type) {
        currentType = type;
        document.getElementById('btnOPD').classList.toggle('active', type === 'OPD');
        document.getElementById('btnIPD').classList.toggle('active', type === 'IPD');
        updateDistrictView();
    }

    function updateDistrictView() {
        const provData = parsedData.filter(d => d.province === currentProvince);
        
        // กราฟ
        const ctx = document.getElementById('mainChart').getContext('2d');
        const datasets = provData.map((d, i) => ({
            label: d.district,
            data: currentType === 'OPD' ? d.opd : d.ipd,
            borderColor: chartColors[i % chartColors.length],
            borderWidth: 2, tension: 0.3
        }));

        if (mainChartInstance) mainChartInstance.destroy();
        mainChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: ['ปี 2564', 'ปี 2565', 'ปี 2566', 'ปี 2567', 'ปี 2568'], datasets: datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12 } },
                    title: { display: true, text: `แนวโน้มผู้ป่วย ${currentType} จังหวัด${currentProvince} รายอำเภอ (2564-2568)`, font: { size: 16 } }
                }
            }
        });

        // ตาราง
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        provData.forEach(d => {
            const dataArr = currentType === 'OPD' ? d.opd : d.ipd;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d.district}</td>
                <td>${dataArr[0].toLocaleString()}</td>
                <td>${dataArr[1].toLocaleString()}</td>
                <td>${dataArr[2].toLocaleString()}</td>
                <td>${dataArr[3].toLocaleString()}</td>
                <td>${dataArr[4].toLocaleString()}</td>
                <td class="total-col">${(currentType === 'OPD' ? d.opdTot : d.ipdTot).toLocaleString()}</td>
                <td class="avg-col">${(currentType === 'OPD' ? d.opdAvg : d.ipdAvg).toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    updateDistrictView();
</script>
</body>
</html>
